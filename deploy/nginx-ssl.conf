server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ app.kumanomorikaken.co.jp kumanomorikaken.co.jp 220.158.27.121;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://app.kumanomorikaken.co.jp$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name app.kumanomorikaken.co.jp;

    ssl_certificate /etc/letsencrypt/live/app.kumanomorikaken.co.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.kumanomorikaken.co.jp/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /var/www/kumanomori/static/;
        expires 1h;
    }
}
