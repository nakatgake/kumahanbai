name: Deploy to XServer VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Backup current VPS release via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 220.158.27.121
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            BACKUP_DIR="/root/kumanomori_backups"
            TS="$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            if [ -d /var/www/kumanomori ]; then
              tar --exclude='/var/www/kumanomori/venv' \
                  --exclude='/var/www/kumanomori/__pycache__' \
                  -czf "$BACKUP_DIR/release_$TS.tar.gz" \
                  -C /var/www kumanomori
              cp "$BACKUP_DIR/release_$TS.tar.gz" "$BACKUP_DIR/latest.tar.gz"
            fi
            if [ -f /etc/nginx/sites-available/kumanomori ]; then
              cp -a /etc/nginx/sites-available/kumanomori "$BACKUP_DIR/latest.nginx.conf"
            fi
            if [ -e /etc/nginx/sites-enabled/default ]; then
              cp -a /etc/nginx/sites-enabled/default "$BACKUP_DIR/latest.nginx.default"
            else
              rm -f "$BACKUP_DIR/latest.nginx.default"
            fi

      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 220.158.27.121
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "main.py,models.py,database.py,requirements.txt,billing_integrity_check.py,templates,static,utils,deploy"
          target: "/var/www/kumanomori/"
          rm: false

      - name: Restart services via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 220.158.27.121
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/kumanomori
            if [ ! -x venv/bin/python ]; then
              python3 -m venv venv
            fi
            venv/bin/python -m pip install --upgrade pip
            venv/bin/python -m pip install -r requirements.txt
            venv/bin/python -m pip check
            venv/bin/python -m py_compile main.py models.py database.py billing_integrity_check.py
            cp deploy/kumanomori.service /etc/systemd/system/kumanomori.service
            mkdir -p /var/www/letsencrypt
            cp deploy/nginx.conf /etc/nginx/sites-available/kumanomori
            ln -sfn /etc/nginx/sites-available/kumanomori /etc/nginx/sites-enabled/kumanomori
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl daemon-reload
            systemctl restart kumanomori
            systemctl restart nginx
            if ! command -v certbot >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y certbot python3-certbot-nginx
            fi
            certbot certonly --webroot \
              -w /var/www/letsencrypt \
              --non-interactive --agree-tos \
              --email info@kumanomorikaken.co.jp \
              -d app.kumanomorikaken.co.jp \
              --keep-until-expiring
            cp deploy/nginx-ssl.conf /etc/nginx/sites-available/kumanomori
            nginx -t
            systemctl restart nginx
            ok=0
            for i in $(seq 1 12); do
              if curl -fsS --max-time 5 http://127.0.0.1:8000/test-ping \
                 && curl -fsS --max-time 5 http://127.0.0.1/test-ping \
                 && curl -fsS --max-time 5 https://app.kumanomorikaken.co.jp/test-ping; then
                ok=1
                break
              fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "Health check failed. Restoring latest backup..."
              journalctl -u kumanomori -n 80 --no-pager || true
              systemctl stop kumanomori || true
              if [ -f /root/kumanomori_backups/latest.tar.gz ]; then
                tar -xzf /root/kumanomori_backups/latest.tar.gz -C /var/www
              fi
              if [ -f /root/kumanomori_backups/latest.nginx.conf ]; then
                cp -a /root/kumanomori_backups/latest.nginx.conf /etc/nginx/sites-available/kumanomori
              fi
              if [ -e /root/kumanomori_backups/latest.nginx.default ]; then
                cp -a /root/kumanomori_backups/latest.nginx.default /etc/nginx/sites-enabled/default
              fi
              systemctl start kumanomori
              nginx -t || true
              systemctl restart nginx
              exit 1
            fi
