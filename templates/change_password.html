{% extends "layout.html" %}

{% block content %}
<h2>パスワード変更</h2>

<div class="card" style="max-width: 500px; margin: 2rem auto; padding: 2rem;">
    
    {% if error %}
    <div style="background: #fff5f5; color: #c53030; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #feb2b2; font-size: 0.9rem;">
        {{ error }}
    </div>
    {% endif %}
    
    {% if success %}
    <div style="background: #f0fff4; color: #276749; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #9ae6b4; font-size: 0.9rem;">
        {{ success }}
    </div>
    {% endif %}

    <form action="/change-password" method="post">
        <div class="form-group">
            <label for="current_password">現在のパスワード</label>
            <input type="password" id="current_password" name="current_password" required>
        </div>
        
        <div class="form-group">
            <label for="new_password">新しいパスワード</label>
            <input type="password" id="new_password" name="new_password" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">新しいパスワード（確認用）</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">変更する</button>
            <a href="/" class="btn" style="flex: 1; text-align: center; background: #e2e8f0; color: #4a5568; text-decoration: none;">戻る</a>
        </div>
    </form>
</div>
{% endblock %}
