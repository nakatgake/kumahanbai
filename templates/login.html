{% extends "layout_guest.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: #2c3e50; font-size: 1.8rem; margin-bottom: 0.5rem;">ログイン</h2>
            <p style="color: #7f8c8d;">（株）熊ノ護化研<br>受発注管理システム</p>
        </div>

        {% if error %}
        <div style="background: #fff5f5; color: #c53030; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #feb2b2; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">ユーザー名</label>
                <input type="text" id="username" name="username" required placeholder="ユーザー名を入力してください" style="width: 100%;">
            </div>
            
            <div class="form-group" style="margin-top: 1.2rem;">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required placeholder="パスワードを入力してください" style="width: 100%;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 0.8rem; font-size: 1.1rem;">
                ログイン
            </button>
        </form>
    </div>
</div>
{% endblock %}
