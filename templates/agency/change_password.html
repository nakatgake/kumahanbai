{% extends "agency/layout.html" %}

{% block content %}
<div class="header">
    <h2>パスワード変更</h2>
</div>

<div class="card" style="max-width: 500px;">
    {% if success %}
    <div style="background: #e8f5e9; color: #2e7d32; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #a5d6a7;">
        {{ success }}
    </div>
    {% endif %}
    {% if error %}
    <div style="background: #ffebee; color: #c62828; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #ffcdd2;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/agency/change-password" method="post">
        <div class="form-group">
            <label>現在のパスワード</label>
            <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
            <label>新しいパスワード</label>
            <input type="password" name="new_password" required minlength="4">
        </div>
        <div class="form-group">
            <label>新しいパスワード（確認）</label>
            <input type="password" name="confirm_password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; background: #1a5276;">パスワードを変更</button>
    </form>
</div>
{% endblock %}
