{% extends "agency/layout.html" %}

{% block content %}
<div class="header">
    <h2>新規発注</h2>
    <a href="/agency/orders" class="btn" style="background: #ccc;">発注履歴へ</a>
</div>

<form action="/agency/order/new" method="post" id="orderForm" style="padding-bottom: 100px;">
    <div class="card">
        <h3 style="margin-bottom: 1rem;">商品一覧</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">数量を入力すると、合計金額が自動計算されます。</p>
        
        <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>商品コード</th>
                    <th>商品名</th>
                    <th style="width: 120px;">単価</th>
                    <th style="width: 100px;">数量</th>
                    <th style="width: 120px;">小計</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr class="product-row" data-price="{{ p.price }}">
                    <td>{{ p.code }}</td>
                    <td>{{ p.name }}</td>
                    <td>¥{{ "{:,.0f}".format(p.price) }}</td>
                    <td>
                        <input type="hidden" name="product_id[]" value="{{ p.id }}">
                        <input type="number" name="quantity[]" value="0" min="0" 
                               style="width: 80px;" 
                               class="qty-input"
                               onchange="updateTotal()" 
                               onkeyup="updateTotal()">
                    </td>
                    <td class="row-subtotal">¥0</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>

    <div class="card" style="margin-bottom: 2rem;">
        <div class="form-group">
            <label>備考</label>
            <textarea name="memo" rows="3" placeholder="発注に関するメモがあれば記入してください"></textarea>
        </div>
    </div>

    <!-- 固定フッター (Sticky Footer) -->
    <div class="sticky-footer">
        <div class="sticky-content">
            <div class="sticky-totals">
                <div class="total-item">
                    <span class="label">合計（税抜）:</span>
                    <span class="value" id="totalAmount">¥0</span>
                </div>
                <div class="total-item highlight">
                    <span class="label">合計（税込）:</span>
                    <span class="value" id="totalWithTax">¥0</span>
                </div>
            </div>
            <div class="sticky-actions">
                <button type="submit" class="submit-btn" onclick="return validateOrder()">
                    <span class="icon">🛒</span> 発注内容を確認して送信
                </button>
            </div>
        </div>
    </div>
</form>

<script>
function updateTotal() {
    let total = 0;
    const rows = document.querySelectorAll('.product-row');
    rows.forEach(row => {
        const price = parseFloat(row.dataset.price);
        const qty = parseInt(row.querySelector('.qty-input').value) || 0;
        const subtotal = price * qty;
        
        row.querySelector('.row-subtotal').textContent = '¥' + subtotal.toLocaleString();
        
        if (qty > 0) {
            row.style.background = '#fffde7'; 
        } else {
            row.style.background = '';
        }
        
        total += subtotal;
    });
    
    document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
    document.getElementById('totalWithTax').textContent = '¥' + Math.floor(total * 1.1).toLocaleString();
}

function validateOrder() {
    let hasOrder = false;
    const inputs = document.querySelectorAll('.qty-input');
    inputs.forEach(input => {
        if (parseInt(input.value) > 0) {
            hasOrder = true;
        }
    });

    if (!hasOrder) {
        alert('数量を1つ以上入力してください');
        return false;
    }
    return confirm('この内容で発注してよろしいですか？');
}

updateTotal();
</script>

<style>
/* Table Styles */
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 0.8rem; }
tr:hover { background: #fcfcfc; }
.qty-input { border: 1px solid #ccc; border-radius: 4px; padding: 6px; text-align: center; font-size: 1rem; }
.qty-input:focus { background: #fff9c4; outline: none; border-color: #fbc02d; box-shadow: 0 0 5px rgba(251, 192, 45, 0.5); }

/* Sticky Footer Styles */
.sticky-footer {
    position: fixed;
    bottom: 0;
    left: 260px; /* サイドバーの幅に合わせて調整 */
    right: 0;
    background: #fff;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    padding: 1rem 2rem;
    z-index: 1000;
    border-top: 1px solid #eee;
}

.sticky-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
}

.sticky-totals {
    display: flex;
    gap: 2rem;
}

.total-item {
    display: flex;
    flex-direction: column;
}

.total-item .label {
    font-size: 0.85rem;
    color: #666;
    font-weight: bold;
}

.total-item .value {
    font-size: 1.25rem;
    font-weight: bold;
    color: #333;
}

.total-item.highlight .value {
    color: #e74c3c;
    font-size: 1.5rem;
}

.sticky-actions {
    flex: 1;
    max-width: 400px;
}

.submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(26, 82, 118, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(26, 82, 118, 0.4);
    filter: brightness(1.1);
}

.submit-btn:active {
    transform: translateY(0);
}

/* Responsiveness */
@media (max-width: 768px) {
    .sticky-footer {
        left: 0;
        padding: 0.8rem 1rem;
    }
    .sticky-content {
        flex-direction: column;
        gap: 0.8rem;
    }
    .sticky-totals {
        width: 100%;
        justify-content: space-around;
        gap: 0.5rem;
    }
    .sticky-actions {
        width: 100%;
        max-width: none;
    }
    .total-item .value { font-size: 1.1rem; }
    .total-item.highlight .value { font-size: 1.25rem; }
    .submit-btn { padding: 0.8rem; font-size: 1.1rem; }
}
</style>
{% endblock %}
