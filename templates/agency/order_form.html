{% extends "agency/layout.html" %}

{% block content %}
<div class="header">
    <h2>新規発注</h2>
    <a href="/agency/orders" class="btn" style="background: #ccc;">発注履歴へ</a>
</div>

<form action="/agency/order/new" method="post" id="orderForm">
    <div class="card">
        <h3 style="margin-bottom: 1rem;">商品一覧</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">数量を入力すると、合計金額が自動計算されます。</p>
        
        <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>商品コード</th>
                    <th>商品名</th>
                    <th style="width: 120px;">単価</th>
                    <th style="width: 100px;">数量</th>
                    <th style="width: 120px;">小計</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr class="product-row" data-price="{{ p.price }}">
                    <td>{{ p.code }}</td>
                    <td>{{ p.name }}</td>
                    <td>¥{{ "{:,.0f}".format(p.price) }}</td>
                    <td>
                        <input type="hidden" name="product_id[]" value="{{ p.id }}">
                        <input type="number" name="quantity[]" value="0" min="0" 
                               style="width: 80px;" 
                               class="qty-input"
                               onchange="updateTotal()" 
                               onkeyup="updateTotal()">
                    </td>
                    <td class="row-subtotal">¥0</td>
                </tr>
                {% endfor %}
            </tbody>
            <tfoot>
                <tr style="background: #f8f9fa;">
                    <td colspan="4" style="text-align: right; font-weight: bold; border-top: 2px solid #ddd;">合計（税抜）:</td>
                    <td style="font-weight: bold; font-size: 1.1rem; border-top: 2px solid #ddd;" id="totalAmount">¥0</td>
                </tr>
                <tr style="background: #eef7fa;">
                    <td colspan="4" style="text-align: right; font-weight: bold; color: #1a5276;">合計（税込10%）:</td>
                    <td style="font-weight: bold; font-size: 1.2rem; color: #1a5276;" id="totalWithTax">¥0</td>
                </tr>
            </tfoot>
        </table>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <label>備考</label>
            <textarea name="memo" rows="3" placeholder="発注に関するメモがあれば記入してください"></textarea>
        </div>
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; background: #1a5276;" onclick="return validateOrder()">
        発注内容を確認して送信
    </button>
</form>

<script>
function updateTotal() {
    let total = 0;
    const rows = document.querySelectorAll('.product-row');
    rows.forEach(row => {
        const price = parseFloat(row.dataset.price);
        const qty = parseInt(row.querySelector('.qty-input').value) || 0;
        const subtotal = price * qty;
        
        row.querySelector('.row-subtotal').textContent = '¥' + subtotal.toLocaleString();
        
        if (qty > 0) {
            row.style.background = '#fffde7'; // 数量が入っている行をハイライト
        } else {
            row.style.background = '';
        }
        
        total += subtotal;
    });
    
    document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
    document.getElementById('totalWithTax').textContent = '¥' + Math.floor(total * 1.1).toLocaleString();
}

function validateOrder() {
    let hasOrder = false;
    const inputs = document.querySelectorAll('.qty-input');
    inputs.forEach(input => {
        if (parseInt(input.value) > 0) {
            hasOrder = true;
        }
    });

    if (!hasOrder) {
        alert('数量を1つ以上入力してください');
        return false;
    }
    return confirm('この内容で発注してよろしいですか？');
}

// 初期計算
updateTotal();
</script>

<style>
table {
    border-collapse: collapse;
}
th, td {
    border: 1px solid #ddd;
    padding: 0.8rem;
}
tr:hover {
    background: #fcfcfc;
}
.qty-input {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 4px;
    text-align: center;
}
.qty-input:focus {
    background: #fff9c4;
    outline: none;
    border-color: #fbc02d;
}
</style>
{% endblock %}
