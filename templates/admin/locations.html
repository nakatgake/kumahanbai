{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>拠点（保管先）管理</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newLocationModal">
            <i class="fas fa-plus"></i> 新規拠点追加
        </button>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>拠点名</th>
                        <th>状態</th>
                        <th>登録日</th>
                    </tr>
                </thead>
                <tbody>
                    {% for loc in locations %}
                    <tr>
                        <td>{{ loc.id }}</td>
                        <td><strong>{{ loc.name }}</strong></td>
                        <td>
                            {% if loc.is_active %}
                            <span class="badge bg-success">有効</span>
                            {% else %}
                            <span class="badge bg-secondary">無効</span>
                            {% endif %}
                        </td>
                        <td>{{ loc.created_at.strftime('%Y/%m/%d %H:%M') }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">拠点が登録されていません。</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="newLocationModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/admin/locations/new" method="POST">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新規拠点の登録</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">拠点名</label>
                        <input type="text" name="name" class="form-control" placeholder="例：東京営業所、B倉庫" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
