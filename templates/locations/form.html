{% extends "layout.html" %}

{% block content %}
<div class="header">
    <h2>{{ '拠点編集' if location else '新規拠点登録' }}</h2>
    <a href="/locations" class="btn">戻る</a>
</div>

<div class="card" style="max-width: 600px;">
    <form action="{{ '/locations/edit/' + (location.id|string) if location else '/locations/new' }}" method="post">
        <div class="form-group">
            <label>拠点名 <span style="color: red;">*</span></label>
            <input type="text" name="name" value="{{ location.name if location else '' }}" required placeholder="例: 第2倉庫、大阪営業所">
        </div>
        
        <div class="form-group">
            <label>説明・メモ</label>
            <textarea name="description" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">{{ location.description if location else '' }}</textarea>
        </div>

        <div class="form-group" style="background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #eee;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-bottom: 0;">
                <input type="checkbox" name="is_default" {{ 'checked' if location and location.is_default else '' }}>
                <span>デフォルト拠点に設定する</span>
            </label>
            <small style="color: #666; display: block; margin-top: 0.5rem;">デフォルト拠点に設定すると、新しい入出荷の際に初期選択されます。</small>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
            {{ '更新を保存する' if location else '拠点を登録する' }}
        </button>
    </form>
    
    {% if location and not location.is_default %}
    <div style="margin-top: 3rem; padding: 1.5rem; border: 1px solid #ffcccb; border-radius: 8px; background-color: #fff5f5;">
        <h3 style="color: #e74c3c; margin-bottom: 1rem; font-size: 1.1rem;">⚠️ 危険な操作</h3>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">この拠点を完全に削除します。※この拠点にある在庫データがないことを確認してください。</p>
        <form action="/locations/delete/{{ location.id }}" method="post" onsubmit="return confirm('この拠点を削除してもよろしいですか？');">
            <button type="submit" class="btn btn-danger" style="background: #e74c3c; border: none; padding: 0.7rem 1.2rem;">この拠点を削除する</button>
        </form>
    </div>
    {% endif %}
</div>
{% endblock %}
